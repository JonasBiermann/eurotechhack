<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnKui · Presentation</title>
  <style>
    :root { --accent: #2b7a78; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }

    /* Full-screen stacked layers */
    .layer {
      position: fixed; inset: 0;
      opacity: 0; visibility: hidden;
      transition: opacity .45s ease;
      z-index: 1;
    }
    .layer.active { opacity: 1; visibility: visible; z-index: 2; }

    iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; }

    #videoLayer { background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; background: #000; }

    /* Navigation arrows */
    .nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      z-index: 50;
      width: 64px; height: 64px; border-radius: 50%;
      border: none; cursor: pointer;
      background: rgba(20,20,20,.55); color: #fff;
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; line-height: 1;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
      transition: background .2s, transform .15s, opacity .2s;
    }
    .nav:hover { background: var(--accent); }
    .nav:active { transform: translateY(-50%) scale(.92); }
    .nav:disabled { opacity: .25; cursor: default; pointer-events: none; }
    #prevBtn { left: 24px; }
    #nextBtn { right: 24px; }

    /* Slide indicator dots */
    .dots {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      z-index: 50; display: flex; gap: 10px;
      padding: 8px 14px; border-radius: 999px;
      background: rgba(20,20,20,.45); backdrop-filter: blur(8px);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.35); transition: background .25s, transform .25s; }
    .dot.active { background: #fff; transform: scale(1.25); }
  </style>
</head>
<body>
  <!-- Slide 0: Resident site -->
  <div class="layer active" id="residentLayer" data-slide="0">
    <iframe id="residentFrame" src="http://localhost:5173/" title="Resident site"></iframe>
  </div>

  <!-- Slide 1: Transition video -->
  <div class="layer" id="videoLayer" data-slide="1">
    <video id="video" src="/transition.mp4" preload="auto" playsinline muted></video>
  </div>

  <!-- Slide 2: Government site -->
  <div class="layer" id="governmentLayer" data-slide="2">
    <iframe id="governmentFrame" src="http://localhost:5174/" title="Government site"></iframe>
  </div>

  <!-- Controls: keyboard arrows only -->
  <div class="dots">
    <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <script>
    const layers = [...document.querySelectorAll('.layer')];
    const dots   = [...document.querySelectorAll('.dot')];
    const video  = document.getElementById('video');
    const LAST = layers.length - 1;
    let current = 0;

    function show(index) {
      index = Math.max(0, Math.min(LAST, index));
      if (index === current) return;
      current = index;

      layers.forEach((l, i) => l.classList.toggle('active', i === current));
      dots.forEach((d, i) => d.classList.toggle('active', i === current));

      // Play the video only while its slide is active; reset otherwise.
      if (current === 1) {
        video.currentTime = 0;
        video.play().catch(() => {});
      } else {
        video.pause();
      }
    }

    const next = () => show(current + 1);
    const prev = () => show(current - 1);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    });

    // Arrows forwarded from the embedded sites (they capture keys when focused).
    window.addEventListener('message', (e) => {
      if (!e.data || e.data.type !== 'slide-nav') return;
      if (e.data.key === 'ArrowRight') next();
      else if (e.data.key === 'ArrowLeft') prev();
    });

    // Make sure the shell has keyboard focus on load.
    window.focus();

    // When the transition video finishes, advance to the government view.
    video.addEventListener('ended', () => { if (current === 1) next(); });
  </script>
</body>
</html>
